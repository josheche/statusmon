<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="pokeball" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#78C850" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Pokeball decorative element (left) -->
  <g transform="translate(80, 100)" opacity="0.15">
    <circle r="45" fill="none" stroke="#fff" stroke-width="2"/>
    <line x1="-45" y1="0" x2="45" y2="0" stroke="#fff" stroke-width="2"/>
    <circle r="12" fill="none" stroke="#fff" stroke-width="2"/>
    <circle r="6" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="400" y="85" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="52" font-weight="bold" fill="#fff" filter="url(#glow)">
    STATUSMON
  </text>

  <!-- Subtitle -->
  <text x="400" y="120" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="16" fill="#78C850" opacity="0.9">
    Train Pokemon companions across your Claude Code sessions
  </text>

  <!-- Type badges -->
  <g transform="translate(245, 145)">
    <rect width="50" height="20" rx="4" fill="#F08030" opacity="0.8"/>
    <text x="25" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">FIRE</text>
  </g>
  <g transform="translate(305, 145)">
    <rect width="55" height="20" rx="4" fill="#6890F0" opacity="0.8"/>
    <text x="27" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">WATER</text>
  </g>
  <g transform="translate(370, 145)">
    <rect width="55" height="20" rx="4" fill="#78C850" opacity="0.8"/>
    <text x="27" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">GRASS</text>
  </g>
  <g transform="translate(435, 145)">
    <rect width="70" height="20" rx="4" fill="#F8D030" opacity="0.8"/>
    <text x="35" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">ELECTRIC</text>
  </g>
  <g transform="translate(515, 145)">
    <rect width="60" height="20" rx="4" fill="#705898" opacity="0.8"/>
    <text x="30" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff">GHOST</text>
  </g>

  <!-- Version pill -->
  <g transform="translate(690, 15)">
    <rect width="80" height="22" rx="11" fill="#78C850" opacity="0.2" stroke="#78C850" stroke-width="1" stroke-opacity="0.4"/>
    <text x="40" y="15" text-anchor="middle" font-family="monospace" font-size="11" fill="#78C850">v0.1.0</text>
  </g>

  <!-- Pokeball decorative element (right) -->
  <g transform="translate(720, 100)" opacity="0.15">
    <circle r="45" fill="none" stroke="#fff" stroke-width="2"/>
    <line x1="-45" y1="0" x2="45" y2="0" stroke="#fff" stroke-width="2"/>
    <circle r="12" fill="none" stroke="#fff" stroke-width="2"/>
    <circle r="6" fill="#fff" opacity="0.3"/>
  </g>
</svg>
